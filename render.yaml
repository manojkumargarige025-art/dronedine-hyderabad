# Render Blueprint — optional; you can also set these in the Render dashboard
services:
  - type: web
    name: dronedine-hyderabad
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
