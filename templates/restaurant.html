{% extends "layout.html" %}

{% block title %}Restaurant Dashboard - DroneDine{% endblock %}

{% block extra_head %}
<style>
    .stats-grid {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
    }
    .stat-card {
        background: #1e293b;
        border-radius: 20px;
        padding: 1rem;
        flex: 1;
        min-width: 120px;
        text-align: center;
    }
    .stat-value {
        font-size: 1.8rem;
        font-weight: bold;
        color: #f59e0b;
    }
    .orders-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .order-card {
        background: #1e293b;
        border-radius: 20px;
        padding: 1rem;
        border-left: 4px solid #f59e0b;
    }
    .order-header {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 0.5rem;
    }
    .order-id {
        font-weight: bold;
        color: #f59e0b;
    }
    .order-status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: bold;
        background: #334155;
    }
    .order-details {
        margin: 0.5rem 0;
        font-size: 0.9rem;
    }
    .order-items {
        background: #0f172a;
        border-radius: 12px;
        padding: 0.5rem;
        margin: 0.5rem 0;
    }
    .password-display {
        background: #0f172a;
        padding: 0.5rem;
        border-radius: 12px;
        font-family: monospace;
        font-size: 1.2rem;
        text-align: center;
        letter-spacing: 2px;
        margin: 0.5rem 0;
    }
    .action-buttons {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
    }
    .action-btn {
        background: #334155;
        border: none;
        padding: 6px 12px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: 0.2s;
    }
    .action-btn:hover {
        background: #f59e0b;
        color: #0a1a2f;
    }
    .logout-btn {
        background: #ef4444;
        color: white;
        margin-bottom: 1rem;
    }
    .refresh-btn {
        background: #f59e0b;
        margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
        .order-header { flex-direction: column; gap: 0.5rem; }
        .action-buttons { justify-content: center; }
    }
</style>
{% endblock %}

{% block content %}
<h1><i class="fas fa-store"></i> Restaurant Dashboard</h1>
<div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
    <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh Orders</button>
</div>

<div class="stats-grid" id="statsContainer">
    <div class="stat-card"><div class="stat-value" id="todayOrders">0</div><div>Today's Orders</div></div>
    <div class="stat-card"><div class="stat-value" id="todayRevenue">₹0</div><div>Today's Revenue</div></div>
    <div class="stat-card"><div class="stat-value" id="activeOrders">0</div><div>Active Orders</div></div>
</div>

<div id="ordersContainer" class="orders-list">
    <p>Loading orders...</p>
</div>

<script>
    // Helper: fetch with credentials (session cookie)
    async function apiFetch(url, options = {}) {
        const response = await fetch(url, {
            ...options,
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json', ...options.headers }
        });
        if (response.status === 401) {
            window.location.href = '/restaurant/login';
            throw new Error('Unauthorized');
        }
        return response;
    }

    // Load restaurant info and stats
    async function loadStats() {
        try {
            const res = await apiFetch('/api/restaurant/stats');
            const stats = await res.json();
            document.getElementById('todayOrders').innerText = stats.today_orders || 0;
            document.getElementById('todayRevenue').innerHTML = `₹${(stats.today_revenue || 0).toFixed(2)}`;
            document.getElementById('activeOrders').innerText = stats.active_orders || 0;
        } catch (err) {
            console.error('Stats error:', err);
        }
    }

    // Load pending orders
    async function loadOrders() {
        try {
            const res = await apiFetch('/api/orders/pending');
            const orders = await res.json();
            renderOrders(orders);
        } catch (err) {
            console.error('Orders error:', err);
            document.getElementById('ordersContainer').innerHTML = '<p>Error loading orders. Please refresh.</p>';
        }
    }

    // Update order status
    async function updateOrderStatus(orderId, action) {
        try {
            const res = await apiFetch(`/api/orders/${orderId}`, {
                method: 'PATCH',
                body: JSON.stringify({ action })
            });
            if (res.ok) {
                // Reload orders and stats
                await loadOrders();
                await loadStats();
            } else {
                const err = await res.json();
                alert(err.error || 'Failed to update status');
            }
        } catch (err) {
            alert('Network error');
        }
    }

    // Fetch and display password for an order (already shown on load)
    async function fetchPassword(orderId, passwordSpanId) {
        try {
            const res = await apiFetch(`/api/orders/${orderId}/password`);
            if (res.ok) {
                const data = await res.json();
                const span = document.getElementById(passwordSpanId);
                if (span) span.innerText = data.password;
            } else {
                const span = document.getElementById(passwordSpanId);
                if (span) span.innerText = 'Error';
            }
        } catch (err) {
            console.error('Password fetch error:', err);
        }
    }

    function renderOrders(orders) {
        const container = document.getElementById('ordersContainer');
        if (!orders.length) {
            container.innerHTML = '<p>No active orders at the moment.</p>';
            return;
        }
        container.innerHTML = orders.map(order => {
            const passwordId = `pw-${order.id}`;
            // Items display
            let itemsHtml = '';
            if (order.items) {
                const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
                itemsHtml = items.map(i => `${i.name} x${i.quantity}`).join(', ');
            }
            // Determine which action buttons to show based on current status
            let actionButtons = '';
            const status = order.status;
            if (status === 'pending') {
                actionButtons = `<button class="action-btn" data-id="${order.id}" data-action="accept">Accept Order</button>
                                 <button class="action-btn" data-id="${order.id}" data-action="decline">Decline</button>`;
            } else if (status === 'accepted') {
                actionButtons = `<button class="action-btn" data-id="${order.id}" data-action="preparing">Mark Preparing</button>`;
            } else if (status === 'preparing') {
                actionButtons = `<button class="action-btn" data-id="${order.id}" data-action="out_for_delivery">Send for Delivery</button>`;
            } else if (status === 'out_for_delivery') {
                actionButtons = `<button class="action-btn" data-id="${order.id}" data-action="delivered">Mark Delivered</button>`;
            }
            return `
                <div class="order-card" data-order-id="${order.id}">
                    <div class="order-header">
                        <span class="order-id">Order #${order.id}</span>
                        <span class="order-status">${order.status.replace(/_/g, ' ')}</span>
                    </div>
                    <div class="order-details">
                        <strong>${order.customer_name}</strong> | 📞 ${order.customer_phone}<br>
                        📍 ${order.customer_address}
                    </div>
                    <div class="order-items">
                        🍽️ ${itemsHtml || 'Items not available'}
                    </div>
                    <div class="order-details">
                        💰 Total: ₹${order.total_amount}
                    </div>
                    <div class="password-display">
                        🔐 Drone Box Password: <span id="${passwordId}">Loading...</span>
                    </div>
                    <div class="action-buttons">
                        ${actionButtons}
                    </div>
                </div>
            `;
        }).join('');

        // Attach event listeners to action buttons
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const orderId = btn.getAttribute('data-id');
                const action = btn.getAttribute('data-action');
                updateOrderStatus(orderId, action);
            });
        });

        // Fetch passwords for each order
        orders.forEach(order => {
            fetchPassword(order.id, `pw-${order.id}`);
        });
    }

    // Logout
    document.getElementById('logoutBtn').onclick = async () => {
        await apiFetch('/api/restaurant/logout', { method: 'POST' });
        window.location.href = '/restaurant/login';
    };
    document.getElementById('refreshBtn').onclick = () => {
        loadOrders();
        loadStats();
    };

    // Initial load
    loadStats();
    loadOrders();
    // Auto-refresh every 15 seconds
    setInterval(() => {
        loadOrders();
        loadStats();
    }, 15000);
</script>
{% endblock %}
