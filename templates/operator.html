<!DOCTYPE html>
<html>
<head>
    <title>DroneDine Operator Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; background: #0a1a2f; color: white; padding: 20px; }
        .order-card { background: #1e293b; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        button { background: #f59e0b; border: none; padding: 8px 16px; border-radius: 40px; margin-right: 10px; cursor: pointer; }
        .arrived { border-left: 4px solid #10b981; }
    </style>
</head>
<body>
<h1>🚁 Drone Command Center</h1>
<div id="ordersList">Loading orders...</div>
<script>
    async function loadOrders() {
        const res = await fetch('/api/orders');
        const orders = await res.json();
        const container = document.getElementById('ordersList');
        if (orders.length === 0) {
            container.innerHTML = '<p>No active orders</p>';
            return;
        }
        container.innerHTML = orders.map(order => `
            <div class="order-card ${order.arrived ? 'arrived' : ''}">
                <strong>Order #${order.id}</strong><br>
                Customer: ${order.customer_name}<br>
                Phone: ${order.customer_phone}<br>
                Address: ${order.customer_address}<br>
                Status: ${order.status}<br>
                Drone Arrived: ${order.arrived ? '✅ Yes' : '⏳ In flight'}<br>
                <button onclick="notifyCustomer('${order.customer_phone}', ${order.id})">📱 WhatsApp Customer</button>
                <button onclick="callCustomer('${order.customer_phone}')">📞 Call Customer</button>
            </div>
        `).join('');
    }
    function notifyCustomer(phone, orderId) {
        const msg = `Your DroneDine order #${orderId} has arrived. Please use your 4-digit PIN to unlock the box.`;
        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
    function callCustomer(phone) {
        window.location.href = `tel:+91${phone}`;
    }
    loadOrders();
    setInterval(loadOrders, 5000); // refresh every 5 seconds
</script>
</body>
</html>
