<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - DroneDine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .otp-card { background: white; border-radius: 32px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; }
        .otp-card h2 { color: #f97316; margin-bottom: 0.5rem; }
        .input-group { margin-bottom: 1.2rem; }
        .input-group input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 40px; text-align: center; letter-spacing: 4px; }
        .btn { background: #f97316; color: white; border: none; padding: 0.8rem; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; }
        .demo-note { margin-top: 1.5rem; font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="otp-card">
    <h2><i class="fas fa-key"></i> Verify OTP</h2>
    <p>Enter the 6-digit code sent to your mobile</p>
    {% if error %}<div style="background:#fee2e2; color:#dc2626; padding:0.5rem; border-radius:20px; margin-bottom:1rem;">{{ error }}</div>{% endif %}
    <form method="POST">
        <div class="input-group"><input type="text" name="otp" placeholder="123456" maxlength="6" required></div>
        <button type="submit" class="btn">Verify & Login</button>
    </form>
    <div class="demo-note"><i class="fas fa-info-circle"></i> Demo OTP: 123456</div>
</div>
</body>
</html>
