<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneDine - Live Dynamic Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0a1a2f;
            color: white;
        }
        #map {
            height: 400px;
            width: 100%;
        }
        .tracking-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(15, 35, 60, 0.9);
            border-radius: 24px;
        }
        .eta {
            font-size: 2rem;
            font-weight: bold;
            color: #f59e0b;
        }
        .chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .key {
            background: #1e293b;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            color: white;
        }
        button {
            background: #f59e0b;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
<div id="map"></div>
<div class="tracking-container">
    <h2><i class="fas fa-drone"></i> Your Order is On the Way</h2>
    <div id="addressDisplay" class="status-text">📍 Delivering to: <span id="dynamicAddress">Loading...</span></div>
    <div class="eta">ARRIVING IN <span id="etaSeconds">120</span> seconds</div>
    <div id="passwordDisplay" class="status-text">Delivery PIN: <strong>****</strong> (shown after landing)</div>
    <div id="unlockSection" style="display:none;">
        <h3>Enter PIN to Unlock Box</h3>
        <div class="keypad" id="keypad"></div>
        <input type="text" id="pinInput" maxlength="4" placeholder="____">
        <button id="unlockBtn">Unlock</button>
    </div>
</div>
<button id="chatSupportBtn" class="chat-btn"><i class="fab fa-whatsapp"></i> Chat Support</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ========== DELIVERY ZONE (Green Zone) ==========
const ZONE_CENTER = [17.4300, 78.3450]; // Gachibowli center
const ZONE_RADIUS_KM = 3.0; // 3 km

// Draw the zone circle on the map
const zoneCircle = L.circle(ZONE_CENTER, {
    color: '#06b6d4',        // cyan border
    weight: 2,
    fillColor: '#38bdf8',
    fillOpacity: 0.15,
    radius: ZONE_RADIUS_KM * 1000 // meters
}).addTo(map).bindPopup('DroneDine Green Zone<br>Active Delivery Area');

// Haversine formula to calculate distance between two lat/lng points (in km)
function haversineDistance(lat1, lon1, lat2, lon2) {
    const toRad = (angle) => (angle * Math.PI) / 180;
    const R = 6371; // Earth radius in km
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon / 2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

function isWithinZone(lat, lng) {
    const distance = haversineDistance(lat, lng, ZONE_CENTER[0], ZONE_CENTER[1]);
    return distance <= ZONE_RADIUS_KM;
}
    // ---------- Get order from sessionStorage ----------
    const order = JSON.parse(sessionStorage.getItem('currentOrder'));
    if (!order) {
        alert('No active order. Redirecting to home.');
        window.location.href = '/';
    }
    const correctPassword = order.password;
    const deliveryAddress = order.customer_address || "Gachibowli, Hyderabad"; // fallback

    // Update address display
    document.getElementById('dynamicAddress').innerText = deliveryAddress;

    // ---------- Map setup (kitchen is fixed) ----------
    const kitchenCoords = [17.4416, 78.3489]; // Pista House
    let destinationCoords = null;

    const map = L.map('map').setView([17.4265, 78.3450], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB'
    }).addTo(map);

    // Kitchen marker (fixed)
    const kitchenMarker = L.marker(kitchenCoords).addTo(map).bindPopup('Pista House (Kitchen)');
    let destinationMarker = null;
    let routeLine = null;
    let droneMarker = null;
    const droneIcon = L.divIcon({ html: '<i class="fas fa-drone" style="font-size:28px; color:#f59e0b;"></i>', iconSize: [32,32] });

    // ---------- Geocode address using Nominatim (free, no API key) ----------
    async function geocodeAddress(address) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
        const response = await fetch(url, {
            headers: { 'User-Agent': 'DroneDine-Hyderabad/1.0' } // Nominatim requires a User-Agent
        });
        const data = await response.json();
        if (data && data.length > 0) {
            return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        } else {
            throw new Error('Address not found. Please check the location.');
        }
    }

    // ---------- Main flow: geocode, then start simulation ----------
    async function initTracking() {
        document.getElementById('addressDisplay').innerHTML = `📍 Geocoding address...`;
        try {
            destinationCoords = await geocodeAddress(deliveryAddress);
            document.getElementById('addressDisplay').innerHTML = `📍 Delivering to: ${deliveryAddress}`;

            // Update map: add destination marker and route line
            if (destinationMarker) map.removeLayer(destinationMarker);
            destinationMarker = L.marker(destinationCoords).addTo(map).bindPopup('Your Drop Zone');
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([kitchenCoords, destinationCoords], { color: '#f59e0b', weight: 2, dashArray: '5, 10' }).addTo(map);
            map.fitBounds([kitchenCoords, destinationCoords]);

            // Add drone marker at kitchen
            if (droneMarker) map.removeLayer(droneMarker);
            droneMarker = L.marker(kitchenCoords, { icon: droneIcon }).addTo(map);

            // Start the drone animation and countdown
            startDroneAnimation();
        } catch (err) {
            alert('Failed to locate address: ' + err.message);
            console.error(err);
            // Fallback to a default location (e.g., Gachibowli center)
            destinationCoords = [17.4265, 78.3450];
            initTracking(); // retry with fallback (avoid infinite loop? but safe enough)
        }
    }

    // ---------- Drone animation and countdown ----------
    let animationId = null;
    let countdownInterval = null;
    let eta = 120; // seconds

    function startDroneAnimation() {
        if (!destinationCoords) return;
        const start = kitchenCoords;
        const end = destinationCoords;
        const duration = 10000; // 10 seconds
        const startTime = performance.now();
        let isAnimating = true;

        function step(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            const lat = start[0] + (end[0] - start[0]) * t;
            const lng = start[1] + (end[1] - start[1]) * t;
            if (droneMarker) droneMarker.setLatLng([lat, lng]);
            if (t < 1) {
                animationId = requestAnimationFrame(step);
            } else {
                cancelAnimationFrame(animationId);
                isAnimating = false;
                // Drone landed
                document.getElementById('unlockSection').style.display = 'block';
                document.getElementById('passwordDisplay').innerHTML = `Delivery PIN: <strong>${correctPassword}</strong>`;
                map.setView(end, 16);
                // Stop ETA timer
                if (countdownInterval) clearInterval(countdownInterval);
                document.getElementById('etaSeconds').innerText = '0';
            }
        }
        animationId = requestAnimationFrame(step);

        // ETA countdown
        eta = 120;
        const etaSpan = document.getElementById('etaSeconds');
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (eta <= 0 || !isAnimating) {
                clearInterval(countdownInterval);
                etaSpan.innerText = '0';
            } else {
                eta--;
                etaSpan.innerText = eta;
            }
        }, 1000);
    }

    // ---------- Keypad and PIN verification ----------
    function generateKeypad() {
        const pad = document.getElementById('keypad');
        if (!pad) return;
        pad.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('div');
            btn.className = 'key';
            btn.innerText = i;
            btn.onclick = () => { const inp = document.getElementById('pinInput'); if (inp.value.length < 4) inp.value += i; };
            pad.appendChild(btn);
        }
        const zero = document.createElement('div');
        zero.className = 'key'; zero.innerText = '0';
        zero.onclick = () => { const inp = document.getElementById('pinInput'); if (inp.value.length < 4) inp.value += '0'; };
        const clear = document.createElement('div');
        clear.className = 'key'; clear.innerText = '⌫';
        clear.onclick = () => { const inp = document.getElementById('pinInput'); inp.value = inp.value.slice(0, -1); };
        pad.appendChild(zero);
        pad.appendChild(clear);
    }

    document.getElementById('unlockBtn').onclick = () => {
        const entered = document.getElementById('pinInput').value;
        if (entered === correctPassword) {
            alert('✅ Box unlocked! Enjoy your meal.');
            document.getElementById('unlockSection').style.display = 'none';
        } else {
            alert('❌ Wrong PIN. Try again.');
            document.getElementById('pinInput').value = '';
        }
    };

    document.getElementById('chatSupportBtn').onclick = () => {
        window.open('https://wa.me/919876543210?text=Help%20with%20order', '_blank');
    };

    generateKeypad();
    initTracking();
</script>
</body>
</html>
