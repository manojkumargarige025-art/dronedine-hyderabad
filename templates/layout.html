<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DroneDine Hyderabad | {% block title %}Smart Drone Delivery{% endblock %}</title>
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <!-- Leaflet CSS (only if map needed) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <a href="/static/simulator.html">🚁 Simulator</a>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-drone"></i>
            <span>DroneDine</span>
        </div>
        <div class="nav-links">
    <a href="{{ url_for('customer_page') }}">Order</a>
    <a href="/track">Tracking</a>
    <a href="/support">Support</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>© 2026 DroneDine Hyderabad | 5% Commission | Zero GST Burden</p>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
