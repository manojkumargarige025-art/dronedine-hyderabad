<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Login | DroneDine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  {% set active_page = 'restaurant' %}
  {% include '_navbar.html' %}

  <main class="page-main">
    <section class="card login-card">
      <h1 class="page-title"><i class="fas fa-store"></i> Restaurant Login</h1>
      <p class="page-subtitle">Staff only — manage incoming drone delivery orders.</p>
      <form id="login-form">
        <div class="form-group">
          <label>Restaurant</label>
          <select id="restaurant-id" class="form-control" required>
            <option value="">Select restaurant</option>
            <option value="bawarchi">Bawarchi Restaurant</option>
            <option value="paradise">Paradise Biryani</option>
            <option value="chutneys">Chutneys South Indian</option>
          </select>
        </div>
        <div class="form-group">
          <label>4-digit PIN</label>
          <input type="password" class="form-control" id="restaurant-pin" maxlength="4" inputmode="numeric" required placeholder="••••">
        </div>
        <button type="submit" class="btn" style="width:100%">
          <i class="fas fa-right-to-bracket"></i> Login
        </button>
      </form>
      <p id="login-message" class="alert alert-error hidden" style="margin-top:1rem;"></p>
      <p class="hint" style="margin-top:1.5rem;">
        Demo PINs: Bawarchi <code>1111</code> · Paradise <code>2222</code> · Chutneys <code>3333</code>
      </p>
    </section>
  </main>

  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("login-message");
      const res = await fetch("/api/restaurant/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({
          restaurant_id: document.getElementById("restaurant-id").value,
          pin: document.getElementById("restaurant-pin").value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = "/restaurant";
      } else {
        msg.textContent = data.error || "Login failed";
        msg.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
