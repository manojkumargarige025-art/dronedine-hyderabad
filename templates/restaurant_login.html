<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Login - DroneDine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .login-card { background: white; border-radius: 32px; padding: 2rem; width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { color: #f97316; margin-bottom: 0.5rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        .input-group label { display: block; font-weight: 500; margin-bottom: 0.3rem; color: #334155; }
        .input-group input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 1rem; }
        .btn { background: #f97316; color: white; border: none; padding: 0.8rem; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; }
        .demo-note { margin-top: 1rem; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>
<div class="login-card">
    <h2><i class="fas fa-store"></i> Restaurant Login</h2>
    <p>Sign in to manage orders</p>
    {% if error %}<div style="background:#fee2e2; color:#dc2626; padding:0.5rem; border-radius:20px; margin-bottom:1rem;">{{ error }}</div>{% endif %}
    <form method="POST">
        <div class="input-group"><label>Restaurant ID</label><input type="text" name="restaurant_id" placeholder="e.g., bawarchi" required></div>
        <div class="input-group"><label>PIN</label><input type="password" name="pin" placeholder="4-digit PIN" maxlength="4" required></div>
        <button type="submit" class="btn">Login</button>
    </form>
    <div class="demo-note"><i class="fas fa-info-circle"></i> Demo: bawarchi/1111, paradise/2222, chutneys/3333</div>
</div>
</body>
</html>
