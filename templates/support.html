<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneDine Support | Ground Operator Helpdesk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #0a1a2f;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
        }
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .support-btn {
            background: #1e293b;
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .support-btn i {
            width: 32px;
            font-size: 1.3rem;
            color: #f59e0b;
        }
        .support-btn:hover {
            background: #f59e0b;
            color: #0a1a2f;
        }
        .info-panel {
            background: #000000aa;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            display: none;
        }
        .green-emergency {
            background: #10b981;
            color: white;
            margin-top: 12px;
        }
        hr {
            border-color: #334155;
            margin: 16px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-headset"></i> DroneDine Support</h1>
    <div class="button-grid">
        <button class="support-btn" id="whereOrderBtn"><i class="fas fa-map-marked-alt"></i> Where is my order?</button>
        <button class="support-btn" id="forgotPinBtn"><i class="fas fa-key"></i> Forgot My Security PIN</button>
        <button class="support-btn" id="emergencyBtn"><i class="fas fa-exclamation-triangle"></i> Emergency: Box Latch Stuck</button>
    </div>
    <div id="infoPanel" class="info-panel"></div>
    <hr>
    <div style="font-size:12px; text-align:center;">Rigid button-only system | No text input to prevent abuse</div>
</div>

<script>
    const panel = document.getElementById('infoPanel');
    document.getElementById('whereOrderBtn').onclick = () => {
        panel.style.display = 'block';
        panel.innerHTML = `<i class="fas fa-map"></i> <strong>Live Tracking:</strong><br><br>
        <div style="background:#1e293b; border-radius:16px; padding:12px;">
        🚁 Drone en route via Green Zone<br>
        📍 Current position: Gachibowli Flyover<br>
        ⏱️ ETA: 4 minutes<br>
        🅿️ Drop point: Mobile Bike Grid, Parking Zone B
        </div>
        <button onclick="this.parentElement.style.display='none'" style="margin-top:12px; background:#f59e0b; border:none; padding:8px; border-radius:20px;">Close</button>`;
    };
    document.getElementById('forgotPinBtn').onclick = () => {
        panel.style.display = 'block';
        panel.innerHTML = `<i class="fas fa-sms"></i> <strong>Secure SMS token sent to your registered mobile number.</strong><br><br>
        <div class="status-text">📱 Use the 6-digit code on the drone keypad within 2 minutes.</div>
        <button onclick="this.parentElement.style.display='none'" style="margin-top:12px; background:#f59e0b; border:none; padding:8px; border-radius:20px;">Close</button>`;
    };
    document.getElementById('emergencyBtn').onclick = () => {
        panel.style.display = 'block';
        panel.innerHTML = `<i class="fas fa-phone-alt"></i> <strong>Immediate escalation</strong><br><br>
        <a href="https://wa.me/919876543210?text=Emergency%20Support%20Needed%20for%20Order%20Corridor%201" target="_blank" 
           style="display:block; background:#25D366; color:white; text-align:center; padding:12px; border-radius:40px; text-decoration:none; font-weight:bold;">
           <i class="fab fa-whatsapp"></i> Connect Directly to Solo Command Center via WhatsApp Call
        </a>
        <button onclick="this.parentElement.style.display='none'" style="margin-top:12px; background:#f59e0b; border:none; padding:8px; border-radius:20px;">Close</button>`;
    };
</script>
</body>
</html>
